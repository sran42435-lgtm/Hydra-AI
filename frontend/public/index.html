<!DOCTYPE html>
<html lang="en">
<head>
  <!-- ============================= -->
  <!-- BASIC META CONFIGURATION -->
  <!-- ============================= -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- ============================= -->
  <!-- SEO & APP IDENTITY -->
  <!-- ============================= -->
  <title>Hydra AI</title>
  <meta name="description" content="Hydra AI - Advanced Modular AI System" />
  <meta name="keywords" content="AI, Chat, Hydra, Assistant, ML, SaaS" />
  <meta name="author" content="Hydra System" />

  <!-- ============================= -->
  <!-- THEME / MOBILE CONFIG -->
  <!-- ============================= -->
  <meta name="theme-color" content="#000000" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />

  <!-- ============================= -->
  <!-- FAVICON -->
  <!-- ============================= -->
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/favicon.ico" />

  <!-- ============================= -->
  <!-- PRECONNECT (PERFORMANCE) -->
  <!-- ============================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- ============================= -->
  <!-- FONTS -->
  <!-- ============================= -->
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet"
  />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
    rel="stylesheet"
  />

  <!-- ============================= -->
  <!-- GLOBAL STYLES -->
  <!-- ============================= -->
  <link rel="stylesheet" href="/styles/main.css" />
  <link rel="stylesheet" href="/styles/theme.css" />
  <link rel="stylesheet" href="/styles/typography.css" />

  <!-- ============================= -->
  <!-- INITIAL STYLE RESET -->
  <!-- ============================= -->
  <style>
    html, body, #root {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #0a0a0a;
      font-family: 'Inter', 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Prevent flash */
    body {
      visibility: hidden;
    }

    /* Loader container */
    #initial-loader {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      z-index: 9999;
    }

    /* Simple loader */
    .loader-dot {
      width: 10px;
      height: 10px;
      margin: 6px;
      border-radius: 50%;
      background: white;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .loader-dot:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loader-dot:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
      }
      40% {
        transform: scale(1);
      }
    }
  </style>
</head>

<body>
  <!-- ============================= -->
  <!-- ROOT CONTAINER -->
  <!-- ============================= -->
  <div id="root"></div>

  <!-- ============================= -->
  <!-- INITIAL LOADING SCREEN -->
  <!-- ============================= -->
  <div id="initial-loader">
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
    <div class="loader-dot"></div>
  </div>
<!-- ============================= -->
  <!-- NOSCRIPT FALLBACK -->
  <!-- ============================= -->
  <noscript>
    <div style="
      display:flex;
      align-items:center;
      justify-content:center;
      height:100vh;
      background:#0a0a0a;
      color:white;
      font-family:Inter, sans-serif;
      text-align:center;
      padding:20px;
    ">
      <div>
        <h2>JavaScript Required</h2>
        <p>
          Hydra AI membutuhkan JavaScript untuk berjalan dengan benar.
          Silakan aktifkan JavaScript di browser kamu.
        </p>
      </div>
    </div>
  </noscript>

  <!-- ============================= -->
  <!-- MAIN SCRIPT (REACT ENTRY) -->
  <!-- ============================= -->
  <!--
    RULE:
    - Tidak boleh blocking
    - Tidak boleh inline logic besar
    - Semua logic ada di React (app.jsx)
  -->
  <script type="module" src="/src/app.jsx"></script>

  <!-- ============================= -->
  <!-- LOADER CLEANUP SCRIPT -->
  <!-- ============================= -->
  <script>
    /**
     * Tujuan:
     * - Menghapus initial loader setelah React mount
     * - Menghindari blank screen
     */

    window.addEventListener("DOMContentLoaded", () => {
      const root = document.getElementById("root");
      const loader = document.getElementById("initial-loader");

      // Safety fallback (kalau React lambat)
      setTimeout(() => {
        document.body.style.visibility = "visible";
      }, 300);

      // Observer untuk cek apakah React sudah render
      const observer = new MutationObserver(() => {
        if (root && root.children.length > 0) {
          if (loader) loader.remove();
          document.body.style.visibility = "visible";
          observer.disconnect();
        }
      });

      if (root) {
        observer.observe(root, { childList: true });
      }
    });
  </script>

  <!-- ============================= -->
  <!-- OPTIONAL: PERFORMANCE HINT -->
  <!-- ============================= -->
  <!--
    Bisa digunakan nanti kalau scale:
    <link rel="modulepreload" href="/src/app.jsx">
  -->

  <!-- ============================= -->
  <!-- SECURITY (BASIC) -->
  <!-- ============================= -->
  <script>
    /**
     * Basic protection (optional ringan)
     * Tidak menggantikan backend security
     */
    (function () {
      try {
        // Disable iframe embedding (clickjacking basic)
        if (window.self !== window.top) {
          window.top.location = window.self.location;
        }
      } catch (e) {
        console.warn("Security check blocked:", e);
      }
    })();
  </script>

  <!-- ============================= -->
  <!-- FINAL BODY END -->
  <!-- ============================= -->
</body>
</html>
